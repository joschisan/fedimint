[package]
authors = ["The Picomint Developers"]
description = "picomint-mint-common is a chaumian ecash mint module. (common types)"
edition = "2021"
license = "MIT"
name = "picomint-mint-common"
readme = "../../README.md"
repository = "https://github.com/picomint/picomint"
version = { workspace = true }

[package.metadata.docs.rs]
rustc-args = ["--cfg", "tokio_unstable"]

[lib]
name = "picomint_mint_common"
path = "src/lib.rs"

[dependencies]
bitcoin_hashes = { workspace = true }
picomint-core = { workspace = true }
picomint-encoding = { workspace = true }
serde = { workspace = true }
tbs = { workspace = true }
thiserror = { workspace = true }

[lints]
workspace = true
