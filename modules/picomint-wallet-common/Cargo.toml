[package]
authors = { workspace = true }
description = "picomint wallet is an on-chain bitcoin wallet module. It uses a key-value store and is not a standard HD wallet. (common types)"
edition = { workspace = true }
license = { workspace = true }
name = "picomint-wallet-common"
readme = { workspace = true }
repository = { workspace = true }
version = { workspace = true }

[package.metadata.docs.rs]
rustc-args = ["--cfg", "tokio_unstable"]

[lib]
name = "picomint_wallet_common"
path = "src/lib.rs"

[dependencies]
bitcoin = { workspace = true }
picomint-core = { workspace = true }
