[package]
authors = ["The Picomint Developers"]
description = "picomint-mint-server is a chaumian ecash mint module."
edition = "2021"
license = "MIT"
name = "picomint-mint-server"
readme = "../../README.md"
repository = "https://github.com/picomint/picomint"
version = { workspace = true }

[package.metadata.docs.rs]
rustc-args = ["--cfg", "tokio_unstable"]

[lib]
name = "picomint_mint_server"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
bitcoin = { workspace = true }
erased-serde = { workspace = true }
picomint-core = { workspace = true }
picomint-logging = { workspace = true }
picomint-mint-common = { workspace = true }
picomint-redb = { workspace = true }
picomint-server-core = { workspace = true }
futures = { workspace = true }
itertools = { workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }
serde = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }
tbs = { workspace = true }
threshold_crypto = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[lints]
workspace = true
